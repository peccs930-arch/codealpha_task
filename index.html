<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Language Translator</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <!-- Header -->
    <header>
        <h1>
            <i class="fa-solid fa-language"></i>
            AI Language Translator
        </h1>

        <p>Translate text into more than 100 languages instantly.</p>
    </header>

    <!-- Main Container -->
    <div class="container">

        <!-- Input Card -->
        <div class="card">

            <h2>Enter Text</h2>

            <textarea id="inputText"
                placeholder="Type or paste text here..."
                maxlength="5000"></textarea>

            <div class="counter">
                <span id="charCount">0</span>/5000
            </div>

        </div>

        <!-- Controls -->
        <div class="controls">

            <div class="select-group">

                <label>From</label>

                <select id="sourceLanguage"></select>

            </div>

            <button id="swapBtn" title="Swap Languages">
                <i class="fa-solid fa-right-left"></i>
            </button>

            <div class="select-group">

                <label>To</label>

                <select id="targetLanguage"></select>

            </div>

        </div>

        <!-- Translate Button -->
        <button id="translateBtn">
            <i class="fa-solid fa-globe"></i>
            Translate
        </button>

        <!-- Output Card -->
        <div class="card">

            <h2>Translated Text</h2>

            <textarea id="outputText"
                placeholder="Translation will appear here..."
                readonly></textarea>

        </div>

        <!-- Action Buttons -->
        <div class="actions">

            <button id="copyBtn">
                <i class="fa-regular fa-copy"></i>
                Copy
            </button>

            <button id="speakBtn">
                <i class="fa-solid fa-volume-high"></i>
                Speak
            </button>

            <button id="downloadBtn">
                <i class="fa-solid fa-download"></i>
                Download
            </button>

            <button id="clearBtn">
                <i class="fa-solid fa-trash"></i>
                Clear
            </button>

        </div>

        <!-- Loading -->
        <div id="loading" class="loading hidden">

            <i class="fa-solid fa-spinner fa-spin"></i>

            Translating...

        </div>

    </div>

    <!-- Footer -->
    <footer>

        <p>
            Developed using HTML, CSS, JavaScript & LibreTranslate API
        </p>

    </footer>

    <!-- JavaScript Files -->
    <script src="languages.js"></script>
    <script src="api.js"></script>
    <script src="script.js"></script>

</body>

</html>
